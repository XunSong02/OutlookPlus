name: Backend Tests
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: pip install -r requirements.txt coverage httpx
        working-directory: backend

      - name: Run the tests
        run: python -m unittest Test.test_routes_api Test.test_repos_persistence Test.test_backend_happy_path -v
        env:
          PYTHONPATH: backend

      - name: Run coverage
        run: |
          coverage run --source=outlookplus_backend -m unittest Test.test_routes_api Test.test_repos_persistence Test.test_backend_happy_path
          coverage report -m
        env:
          PYTHONPATH: backend
