name: Backend Tests
on:
  push:
    paths:
      - "backend/**"
      - "Test/**"
      - ".github/workflows/run-backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - "Test/**"
      - ".github/workflows/run-backend-tests.yml"

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt coverage
        working-directory: backend

      - name: Run the tests
        run: |
          python -m unittest discover -s Test -p "test*.py" -v
          python -m unittest discover -s backend/tests -p "test*.py" -v
        env:
          PYTHONPATH: backend

      - name: Run coverage
        run: |
          coverage run --source=outlookplus_backend -m unittest discover -s Test -p "test*.py"
          coverage run --append --source=outlookplus_backend -m unittest discover -s backend/tests -p "test*.py"
          coverage report -m --fail-under=70
        env:
          PYTHONPATH: backend
